name: Extract IPA Assets and Metadata

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: https://dl.iosvizor.net/assassins-creed-mirage/Assassins-Creed-Mirage-v1.3.0-iosvizor.ipa
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
    # ১. রিপোজিটরি চেকআউট করা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. প্রয়োজনীয় টুলস ইনস্টল করা (Unzip, Strings, Binutils)
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip binutils

    # ৩. লিঙ্ক থেকে IPA ফাইলটি ডাউনলোড করা
    - name: Download IPA File
      run: |
        echo "Downloading IPA from: ${{ github.event.inputs.ipa_url }}"
        curl -L "${{ github.event.inputs.ipa_url }}" -o app_target.ipa

    # ৪. এক্সট্রাকশন ডিরেক্টরি তৈরি করা
    - name: Create Extraction Directory
      run: mkdir -p extracted_source

    # ৫. IPA ফাইলটি আনজিপ করা (Assets, Plist, Images এক্সট্রাক্ট হবে)
    - name: Unzip IPA Packages
      run: |
        if [ -f app_target.ipa ]; then
          unzip app_target.ipa -d extracted_source/Payload_Files || echo "Some files could not be unzipped, continuing..."
        else
          echo "Error: IPA file not found!" && exit 1
        fi

    # ৬. বাইনারি থেকে ক্লাসের নাম, মেথড এবং টেক্সট ডেটা ডাম্প করা (Static Code Analysis)
    - name: Extract Binary Strings and Methods
      run: |
        cd extracted_source
        # Payload ফোল্ডারের ভেতর মূল .app ফাইলটি খোঁজা
        APP_BINARY=$(find Payload_Files/Payload/ -maxdepth 2 -type f -executable | head -n 1)
        
        if [ ! -z "$APP_BINARY" ]; then
          echo "Found application binary at: $APP_BINARY"
          mkdir -p Binary_Analysis
          
          # বাইনারির ভেতরের সমস্ত টেক্সট, এপিআই এন্ডপয়েন্ট ও মেথড নেম ডাম্প করা
          strings "$APP_BINARY" > Binary_Analysis/extracted_strings.txt
          
          # বাইনারির ফাইল ফরম্যাট ও আর্কিটেকচার ইনফো নেওয়া
          file "$APP_BINARY" > Binary_Analysis/binary_info.txt
        else
          echo "No executable binary found. The app might be structured differently."
        fi

    # ৭. পুরো আউটপুটকে একটি জিপ ফাইলে রূপান্তর করা
    - name: Package Extracted Data
      run: |
        zip -r extracted_app_data.zip extracted_source/

    # ৮. এক্সপোর্ট করা ফাইলটি GitHub Artifact হিসেবে আপলোড করা (ডাউনলোড লিঙ্ক পাবেন)
    - name: Upload Extracted Data Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Extracted-IPA-Source-Data
        path: extracted_app_data.zip
        retention-days: 5
